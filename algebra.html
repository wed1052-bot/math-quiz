<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일차식 혼합 계산 마스터</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 650px; text-align: center; border-top: 10px solid #22c55e; }
        .header { display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: bold; color: #166534; }
        
        .problem-box { background: #f0fdf4; border: 2px solid #bbf7d0; border-radius: 20px; padding: 40px 20px; margin-bottom: 30px; min-height: 160px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; color: #1e293b; flex-wrap: wrap; }
        
        /* 분수 스타일 */
        .f-wrap { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; line-height: 1; margin: 0 8px; font-size: 0.9em; }
        .f-num { border-bottom: 3px solid #1e293b; padding: 0 6px; margin-bottom: 2px; }
        .f-den { padding: 0 6px; }

        .answer-zone { background: #f9fafb; padding: 25px; border-radius: 20px; border: 1px solid #e5e7eb; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 1.8rem; margin: 20px 0; }
        
        .fraction-input { display: flex; flex-direction: column; align-items: center; background: white; padding: 10px; border-radius: 12px; border: 2px solid #cbd5e1; }
        input { width: 75px; text-align: center; font-size: 1.8rem; border: none; outline: none; background: transparent; }
        .line-sep { width: 65px; height: 3px; background: #1e293b; margin: 8px 0; }
        
        .btn-main { background: #22c55e; color: white; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; transition: 0.2s; box-shadow: 0 4px 0 #16a34a; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-item { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .stat-label { font-size: 0.9rem; color: #64748b; margin-bottom: 5px; }
        .stat-value { font-size: 1.6rem; font-weight: bold; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count">문제 1 / 10</span>
                <span id="session-info" style="color:#22c55e">세트: 1</span>
            </div>
            <div class="problem-box" id="display">로딩 중...</div>
            
            <div class="answer-zone">
                <p style="color:#166534; font-weight:bold; margin-bottom: 10px;">정답 입력 (정수는 분모에 1)</p>
                <div class="input-row">
                    <div class="fraction-input">
                        <input type="number" id="a-n" placeholder="분자">
                        <div class="line-sep"></div>
                        <input type="number" id="a-d" value="1">
                    </div>
                    <span>x + </span>
                    <div class="fraction-input">
                        <input type="number" id="b-n" placeholder="분자">
                        <div class="line-sep"></div>
                        <input type="number" id="b-d" value="1">
                    </div>
                </div>
                <button class="btn-main" onclick="check()">정답 확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden">
            <h1 style="color:#166534; margin-bottom:10px;">세트 종료! 🎉</h1>
            <input type="text" id="user-name" placeholder="학생 이름을 입력하세요" style="width:80%; font-size:1.5rem; padding:12px; margin-bottom:25px; text-align:center; border-radius:15px; border:3px solid #22c55e; outline:none;">
            
            <div class="stat-item" style="background:#dcfce7; border:none; margin-bottom:20px; padding: 25px;">
                <div class="stat-label" style="font-size: 1.1rem;">이번 세트 점수</div>
                <div class="stat-value" style="font-size:4rem; color: #166534;" id="set-score">0 / 10</div>
            </div>

            <h3 style="text-align:left; color:#475569; margin-left:5px;">📊 전체 누적 통계</h3>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-label">총 세트</div><div class="stat-value" id="total-sets">0</div></div>
                <div class="stat-item"><div class="stat-label">총 정답</div><div class="stat-value" id="total-correct">0</div></div>
                <div class="stat-item"><div class="stat-label">총 정답률</div><div class="stat-value" id="total-rate" style="color:#22c55e;">0%</div></div>
            </div>

            <button class="btn-main" onclick="startNewSet()">다음 세트 계속하기</button>
            <button onclick="window.print()" style="margin-top:20px; background:none; border:none; color:#64748b; text-decoration:underline; cursor:pointer; font-weight:bold;">기록 저장 및 인쇄</button>
        </div>
    </div>

    <script>
        let global = { sets: 0, correct: 0, totalProblems: 0 };
        let session = { idx: 1, score: 0 };
        let cur;

        function makeFrac(n, d) {
            return `<div class="f-wrap"><div class="f-num">${n}</div><div class="f-den">${d}</div></div>`;
        }

        // 정수와 분수가 적절히 섞인 문제 데이터셋
        const problems = [
            // 정수 위주 문제
            { h: `3(x - 2) + 2(x + 5)`, an: 5, ad: 1, bn: 4, bd: 1 },
            { h: `4(2x - 1) - 3(x - 2)`, an: 5, ad: 1, bn: 2, bd: 1 },
            { h: `7x - 2(3x - 5)`, an: 1, ad: 1, bn: 10, bd: 1 },
            { h: `-2(x - 4) + 5(2x + 1)`, an: 8, ad: 1, bn: 13, bd: 1 },
            { h: `10 - 2(x - 4)`, an: -2, ad: 1, bn: 18, bd: 1 },
            // 분수 포함 문제
            { h: `${makeFrac(1, 2)}(4x - 6) + 3x`, an: 5, ad: 1, bn: -3, bd: 1 },
            { h: `2(x + ${makeFrac(1, 2)}) - ${makeFrac(1, 3)}(3x + 9)`, an: 1, ad: 1, bn: -2, bd: 1 },
            { h: `${makeFrac(2, 3)}x + ${makeFrac(1, 6)}x`, an: 5, ad: 6, bn: 0, bd: 1 },
            { h: `${makeFrac('x+1', 2)} + ${makeFrac('x-1', 3)}`, an: 5, ad: 6, bn: 1, bd: 6 },
            { h: `${makeFrac('2x', 5)} - ${makeFrac('x', 2)}`, an: -1, ad: 10, bn: 0, bd: 1 }
        ];

        function load() {
            cur = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('display').innerHTML = cur.h;
        }

        function check() {
            const an = parseInt(document.getElementById('a-n').value);
            const ad = parseInt(document.getElementById('a-d').value);
            const bn = parseInt(document.getElementById('b-n').value);
            const bd = parseInt(document.getElementById('b-d').value);

            if([an, ad, bn, bd].some(isNaN)) return alert("모든 칸을 채워주세요!");

            if(an === cur.an && ad === cur.ad && bn === cur.bn && bd === cur.bd) {
                session.score++; alert("정답입니다! 😊");
            } else {
                alert(`아쉽네요! 정답은 (${cur.an}/${cur.ad})x + (${cur.bn}/${cur.bd})`);
            }

            if(session.idx < 10) {
                session.idx++;
                document.getElementById('q-count').innerText = `문제 ${session.idx} / 10`;
                ['a-n','b-n'].forEach(id => document.getElementById(id).value = "");
                ['a-d','b-d'].forEach(id => document.getElementById(id).value = "1");
                load();
            } else { showResult(); }
        }

        function showResult() {
            global.sets++; global.correct += session.score; global.totalProblems += 10;
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('set-score').innerText = `${session.score} / 10`;
            document.getElementById('total-sets').innerText = global.sets;
            document.getElementById('total-correct').innerText = global.correct;
            document.getElementById('total-rate').innerText = Math.round((global.correct / global.totalProblems) * 100) + "%";
        }

        function startNewSet() {
            session = { idx: 1, score: 0 };
            document.getElementById('q-count').innerText = "문제 1 / 10";
            document.getElementById('session-info').innerText = `세트: ${global.sets + 1}`;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('result-ui').classList.add('hidden');
            load();
        }

        window.onload = load;
    </script>
</body>
</html>
