<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일차식 계산 챌린지</title>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 12px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; border-top: 10px solid var(--primary); }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #065f46; }
        .problem-box { background: #f0fdf4; border-radius: 20px; padding: 45px 10px; margin-bottom: 30px; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: bold; color: #1e293b; letter-spacing: 1px; }
        .answer-zone { background: #f9fafb; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 2rem; margin: 15px 0; }
        input[type="number"] { width: 100px; text-align: center; font-size: 1.8rem; padding: 10px; border: 2px solid #cbd5e1; border-radius: 12px; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #059669; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }
        .result-card { display: none; }
        .score-box { background: #d1fae5; padding: 25px; border-radius: 20px; margin: 20px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-item { background: #f0fdf4; padding: 15px; border-radius: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count">문제 1 / 10</span>
                <span style="color:var(--primary)">일차식 트레이닝</span>
            </div>
            <div class="problem-box" id="display">생성 중...</div>
            <div class="answer-zone">
                <div class="input-row">
                    <input type="number" id="ans-a" placeholder="계수">
                    <span>x + </span>
                    <input type="number" id="ans-b" placeholder="상수">
                </div>
                <button class="btn-main" onclick="check()">정답 확인</button>
            </div>
        </div>

        <div id="result-ui" class="result-card">
            <h2 style="color:#065f46; margin-top:0;">학습 결과 통계 📊</h2>
            <input type="text" id="user-name" placeholder="학생 이름" style="width:80%; padding:10px; font-size:1.2rem; border-radius:10px; border:2px solid var(--primary); text-align:center; margin-bottom:20px;">
            <div class="score-box">
                <div style="color:#065f46; font-weight:bold;">이번 세트 점수</div>
                <div style="font-size:4.5rem; font-weight:900;" id="set-score">0 / 10</div>
            </div>
            <div class="stats-grid">
                <div class="stat-item"><div style="font-size:0.8rem; color:#065f46;">총 세트</div><div style="font-size:1.5rem; font-weight:bold;" id="total-sets">0</div></div>
                <div class="stat-item"><div style="font-size:0.8rem; color:#065f46;">총 정답</div><div style="font-size:1.5rem; font-weight:bold;" id="total-correct">0</div></div>
                <div class="stat-item"><div style="font-size:0.8rem; color:#065f46;">정답률</div><div style="font-size:1.5rem; font-weight:bold;" id="total-rate">0%</div></div>
            </div>
            <button class="btn-main" onclick="startNewSet()">다음 세트 계속하기</button>
        </div>
    </div>

    <script>
        let global = { sets: 0, correct: 0 };
        let session = { idx: 1, score: 0 };
        let targetAns = { a: 0, b: 0 };

        function getRandom(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        // 수학적 표기법 도우미
        function fmtX(n, isFirst = false) {
            if (n === 0) return "";
            let sign = n > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
            let absN = Math.abs(n);
            let val = absN === 1 ? "x" : absN + "x";
            return sign + val;
        }

        function fmtNum(n, isFirst = false) {
            if (n === 0) return "";
            let sign = n > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
            return sign + Math.abs(n);
        }

        function generateProblem() {
            let type = getRandom(1, 3);
            let html = "";

            if (type === 1) { // a(bx + c) + dx + e
                let a = getRandom(-5, 5) || 2;
                let b = getRandom(1, 4);
                let c = getRandom(-9, 9);
                let d = getRandom(-5, 5) || -3;
                let e = getRandom(-9, 9);

                // 문제 텍스트 조립 (기호 누락 방지)
                let term1 = (a === 1) ? `(${b === 1 ? 'x' : b + 'x'} ${fmtNum(c)})` : 
                            (a === -1 ? `-(${b === 1 ? 'x' : b + 'x'} ${fmtNum(c)})` : `${a}(${b === 1 ? 'x' : b + 'x'} ${fmtNum(c)})`);
                let term2 = fmtX(d, false);
                let term3 = fmtNum(e, false);

                html = term1 + term2 + term3;
                targetAns.a = (a * b) + d;
                targetAns.b = (a * c) + e;
            } else if (type === 2) { // (ax + b) + (cx + d)
                let a = getRandom(-5, 5) || 1;
                let b = getRandom(-9, 9);
                let c = getRandom(-5, 5) || -2;
                let d = getRandom(-9, 9);

                html = `(${fmtX(a, true)} ${fmtNum(b)}) ${c > 0 ? '+' : '-'} (${fmtX(Math.abs(c), true)} ${fmtNum(d)})`;
                targetAns.a = a + c;
                targetAns.b = b + d;
            } else { // 단순 동류항
                let a = getRandom(-9, 9) || 4;
                let b = getRandom(-9, 9);
                let c = getRandom(-9, 9) || -5;
                let d = getRandom(-9, 9);
                html = `${fmtX(a, true)} ${fmtNum(b)} ${fmtX(c, false)} ${fmtNum(d)}`;
                targetAns.a = a + c;
                targetAns.b = b + d;
            }
            document.getElementById('display').innerHTML = html;
        }

        function check() {
            const ua = parseInt(document.getElementById('ans-a').value);
            const ub = parseInt(document.getElementById('ans-b').value);
            if(isNaN(ua) || isNaN(ub)) return alert("정답을 입력하세요!");

            if(ua === targetAns.a && ub === targetAns.b) {
                session.score++; alert("정답! ✨");
            } else {
                alert(`오답! 정답은 ${targetAns.a}x ${targetAns.b >= 0 ? '+ ' + targetAns.b : '- ' + Math.abs(targetAns.b)}`);
            }

            if(session.idx < 10) {
                session.idx++;
                document.getElementById('q-count').innerText = `문제 ${session.idx} / 10`;
                document.getElementById('ans-a').value = ""; document.getElementById('ans-b').value = "";
                generateProblem();
            } else { showResult(); }
        }

        function showResult() {
            global.sets++; global.correct += session.score;
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('set-score').innerText = `${session.score} / 10`;
            document.getElementById('total-sets').innerText = global.sets;
            document.getElementById('total-correct').innerText = global.correct;
            document.getElementById('total-rate').innerText = Math.round((global.correct / (global.sets * 10)) * 100) + "%";
        }

        function startNewSet() {
            session.idx = 1; session.score = 0;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('q-count').innerText = "문제 1 / 10";
            document.getElementById('ans-a').value = ""; document.getElementById('ans-b').value = "";
            generateProblem();
        }

        window.onload = generateProblem;
    </script>
</body>
</html>
