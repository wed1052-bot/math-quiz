<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일차식 계산 마스터</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #fff7ed; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; border-top: 10px solid #f97316; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #9a3412; }
        .problem-box { background: #fffaf5; border: 2px solid #fed7aa; border-radius: 20px; padding: 40px 20px; margin-bottom: 30px; min-height: 120px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; color: #1e293b; }
        
        .input-area { background: #fff7ed; padding: 25px; border-radius: 20px; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 2rem; font-weight: bold; margin-bottom: 20px; }
        input { width: 70px; text-align: center; font-size: 1.8rem; padding: 10px; border: 3px solid #fdba74; border-radius: 12px; outline: none; transition: 0.2s; }
        input:focus { border-color: #f97316; background: #fff; }
        
        button { background: #f97316; color: white; border: none; padding: 18px 45px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #ea580c; }
        button:active { transform: translateY(4px); box-shadow: none; }

        .hidden { display: none; }
        .score-card { background: #f97316; color: white; padding: 40px; border-radius: 30px; margin-bottom: 20px; }
        .big-text { font-size: 6rem; font-weight: 900; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count">문제 1 / 10</span>
                <span id="q-score">맞은 개수: 0</span>
            </div>
            <div class="problem-box" id="problem-text">문제를 불러오는 중...</div>
            
            <div class="input-area">
                <p style="color: #9a3412; font-weight: bold; margin-bottom: 15px;">빈칸에 알맞은 수를 입력하세요</p>
                <div class="input-row">
                    ( <input type="number" id="ans-a"> ) x + ( <input type="number" id="ans-b"> )
                </div>
                <button onclick="check()">정답 확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden">
            <h1 style="color: #f97316;">학습 완료! ✨</h1>
            <div class="score-card">
                <div class="big-text" id="final-val">0</div>
                <p>일차식 계산 숙련자</p>
            </div>
            <button onclick="location.reload()" style="background: #444;">다시 도전</button>
        </div>
    </div>

    <script>
        // 중1 일차식 계산 핵심 문제 (괄호 풀기, 동류항 계산)
        const problems = [
            { q: "3(x + 2) + 2(x - 1)", a: 5, b: 4 },
            { q: "4(2x - 1) - 3(x - 2)", a: 5, b: 2 },
            { q: "-2(x - 4) + 5(2x + 1)", a: 8, b: 13 },
            { q: "7x - 2(3x - 5)", a: 1, b: 10 },
            { q: "-(4x - 3) + 2(x + 5)", a: -2, b: 13 },
            { q: "3(2x + 4) - 4(x + 3)", a: 2, b: 0 },
            { q: "5(x - 2) - (2x - 7)", a: 3, b: -3 },
            { q: "2(3x + 1) + 4(x - 2)", a: 10, b: -6 },
            { q: "-3(x + 2) - 2(2x - 5)", a: -7, b: 4 },
            { q: "6(x / 2 + 1) + 4x", a: 7, b: 6 }
        ];

        let idx = 1; let score = 0; let cur;

        function next() {
            cur = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('problem-text').innerText = cur.q;
        }

        function check() {
            const ua = parseInt(document.getElementById('ans-a').value);
            const ub = parseInt(document.getElementById('ans-b').value);

            if (isNaN(ua) || isNaN(ub)) return alert("두 빈칸을 모두 채워주세요!");

            if (ua === cur.a && ub === cur.b) {
                score++; alert("정답입니다! 일차식 천재시군요? 👏");
            } else {
                alert(`오답입니다! 정답은 (${cur.a})x + (${cur.b}) 입니다.`);
            }

            if (idx < 10) {
                idx++;
                document.getElementById('q-count').innerText = `문제 ${idx} / 10`;
                document.getElementById('q-score').innerText = `맞은 개수: ${score}`;
                document.getElementById('ans-a').value = "";
                document.getElementById('ans-b').value = "";
                next();
            } else {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('result-ui').classList.remove('hidden');
                document.getElementById('final-val').innerText = score;
            }
        }

        window.onload = next;
    </script>
</body>
</html>
