<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일차식 괄호 전개 마스터</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #fdfaf6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); width: 100%; max-width: 600px; text-align: center; border-top: 10px solid #f59e0b; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #b45309; }
        .problem-box { background: #fffbeb; border-radius: 20px; padding: 45px 20px; margin-bottom: 30px; min-height: 140px; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; font-weight: bold; color: #1e293b; flex-wrap: wrap; }
        
        /* 분수 스타일 */
        .f-wrap { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; line-height: 1; margin: 0 5px; font-size: 0.85em; }
        .f-num { border-bottom: 3px solid #1e293b; padding: 0 5px; margin-bottom: 2px; }
        .f-den { padding: 0 5px; }

        .answer-zone { background: #fafaf9; padding: 20px; border-radius: 20px; border: 1px solid #e7e5e4; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1.8rem; margin: 15px 0; }
        .fraction-input { display: flex; flex-direction: column; align-items: center; background: white; padding: 8px; border-radius: 10px; border: 2px solid #d6d3d1; }
        input { width: 75px; text-align: center; font-size: 1.8rem; border: none; outline: none; background: transparent; }
        .line-sep { width: 65px; height: 2px; background: #44403c; margin: 5px 0; }
        
        .btn-main { background: #f59e0b; color: white; border: none; padding: 18px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; transition: 0.2s; box-shadow: 0 4px 0 #d97706; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-item { background: #fffbeb; padding: 12px; border-radius: 12px; }
        .stat-label { font-size: 0.85rem; color: #78350f; margin-bottom: 4px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count">문제 1 / 10</span>
                <span id="session-info">세트: 1</span>
            </div>
            <div class="problem-box" id="display">로딩 중...</div>
            <div class="answer-zone">
                <div class="input-row">
                    <div class="fraction-input">
                        <input type="number" id="a-n" placeholder="분자">
                        <div class="line-sep"></div>
                        <input type="number" id="a-d" value="1">
                    </div>
                    <span>x + </span>
                    <div class="fraction-input">
                        <input type="number" id="b-n" placeholder="분자">
                        <div class="line-sep :"></div>
                        <input type="number" id="b-d" value="1">
                    </div>
                </div>
                <button class="btn-main" onclick="check()">정답 확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden">
            <h2 style="color:#b45309;">학습 완료 성적표 📝</h2>
            <input type="text" id="user-name" placeholder="이름을 적어주세요" style="width:70%; font-size:1.3rem; padding:10px; margin-bottom:20px; border-radius:10px; border:2px solid #f59e0b; outline:none; text-align:center;">
            
            <div style="background:#fef3c7; padding:20px; border-radius:20px; margin-bottom:20px;">
                <div style="color:#b45309; font-weight:bold;">이번 세트 점수</div>
                <div style="font-size:3.5rem; font-weight:900;" id="set-score">0 / 10</div>
            </div>

            <div class="stats-grid">
                <div class="stat-item"><div class="stat-label">총 세트</div><div class="stat-value" id="total-sets">0</div></div>
                <div class="stat-item"><div class="stat-label">총 정답</div><div class="stat-value" id="total-correct">0</div></div>
                <div class="stat-item"><div class="stat-label">정답률</div><div class="stat-value" id="total-rate">0%</div></div>
            </div>

            <button class="btn-main" onclick="startNewSet()">다음 세트 도전</button>
            <button onclick="window.print()" style="margin-top:15px; background:none; border:none; color:#78350f; text-decoration:underline; cursor:pointer;">성적표 저장/출력</button>
        </div>
    </div>

    <script>
        let global = { sets: 0, correct: 0, totalProblems: 0 };
        let session = { idx: 1, score: 0 };
        let cur;

        function makeFrac(n, d) {
            return `<div class="f-wrap"><div class="f-num">${n}</div><div class="f-den">${d}</div></div>`;
        }

        // 괄호 전개(메인) + 간단한 문제 + 기초 분수 혼합
        const problemPool = [
            /* 주력: 3(x+2)+2(x-3) 형태의 괄호 전개 (60%) */
            { h: "3(x + 2) + 2(x - 3)", an: 5, ad: 1, bn: 0, bd: 1 },
            { h: "2(x - 4) + 3(2x + 1)", an: 8, ad: 1, bn: -5, bd: 1 },
            { h: "4(2x - 1) - 3(x + 2)", an: 5, ad: 1, bn: -10, bd: 1 },
            { h: "-(x - 3) + 2(3x + 4)", an: 5, ad: 1, bn: 11, bd: 1 },
            { h: "5(x + 1) - (2x - 3)", an: 3, ad: 1, bn: 8, bd: 1 },
            { h: "2(3x - 5) + 4(x + 2)", an: 10, ad: 1, bn: -2, bd: 1 },
            { h: "7(x + 1) - 2(3x + 4)", an: 1, ad: 1, bn: -1, bd: 1 },
            { h: "3(2x - 1) - 5(x - 1)", an: 1, ad: 1, bn: 2, bd: 1 },
            
            /* 기초: 간단한 동류항 및 단일 괄호 (20%) */
            { h: "5x + 3x - 10", an: 8, ad: 1, bn: -10, bd: 1 },
            { h: "4(x - 3) + 7", an: 4, ad: 1, bn: -5, bd: 1 },
            { h: "10x - (3x + 2)", an: 7, ad: 1, bn: -2, bd: 1 },
            { h: "2x + 5 + 4x - 8", an: 6, ad: 1, bn: -3, bd: 1 },

            /* 양념: 간단한 분수 포함 문제 (20%) */
            { h: `${makeFrac(1, 2)}(4x + 6) - x`, an: 1, ad: 1, bn: 3, bd: 1 },
            { h: `${makeFrac(2, 3)}x + ${makeFrac(1, 3)}x + 5`, an: 1, ad: 1, bn: 5, bd: 1 },
            { h: `3(x - ${makeFrac(1, 3)})`, an: 3, ad: 1, bn: -1, bd: 1 },
            { h: `${makeFrac('x+4', 2)}`, an: 1, ad: 2, bn: 2, bd: 1 }
        ];

        function load() {
            cur = problemPool[Math.floor(Math.random() * problemPool.length)];
            document.getElementById('display').innerHTML = cur.h;
        }

        function check() {
            const an = parseInt(document.getElementById('a-n').value);
            const ad = parseInt(document.getElementById('a-d').value);
            const bn = parseInt(document.getElementById('b-n').value);
            const bd = parseInt(document.getElementById('b-d').value);

            if([an, ad, bn, bd].some(isNaN)) return alert("정답을 모두 입력해주세요!");

            if(an === cur.an && ad === cur.ad && bn === cur.bn && bd === cur.bd) {
                session.score++; alert("정답입니다! 아주 잘하고 있어요. ✨");
            } else {
                alert(`오답입니다. 정답은 (${cur.an}/${cur.ad})x + (${cur.bn}/${cur.bd}) 입니다.`);
            }

            if(session.idx < 10) {
                session.idx++;
                document.getElementById('q-count').innerText = `문제 ${session.idx} / 10`;
                ['a-n','b-n'].forEach(id => document.getElementById(id).value = "");
                ['a-d','b-d'].forEach(id => document.getElementById(id).value = "1");
                load();
            } else { showResult(); }
        }

        function showResult() {
            global.sets++; global.correct += session.score; global.totalProblems += 10;
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('set-score').innerText = `${session.score} / 10`;
            document.getElementById('total-sets').innerText = global.sets;
            document.getElementById('total-correct').innerText = global.correct;
            document.getElementById('total-rate').innerText = Math.round((global.correct / global.totalProblems) * 100) + "%";
        }

        function startNewSet() {
            session = { idx: 1, score: 0 };
            document.getElementById('q-count').innerText = "문제 1 / 10";
            document.getElementById('session-info').innerText = `세트: ${global.sets + 1}`;
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('result-ui').classList.add('hidden');
            load();
        }

        window.onload = load;
    </script>
</body>
</html>
