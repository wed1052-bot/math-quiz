<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일차식 분수 계산 챌린지</title>
    <style>
        body { font-family: sans-serif; background: #fdf4ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; border-top: 10px solid #d946ef; }
        .header { display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: bold; color: #701a75; }
        
        /* 문제 영역: 분수가 예쁘게 나오도록 설정 */
        .problem-box { background: #faf5ff; border: 2px solid #f5d0fe; border-radius: 20px; padding: 40px 20px; margin-bottom: 30px; min-height: 160px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; flex-wrap: wrap; gap: 5px; }
        
        /* 분수 디자인 */
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; margin: 0 5px; font-size: 0.85em; line-height: 1.1; }
        .num { border-bottom: 2px solid #1e293b; padding: 0 5px; }
        .den { padding: 0 5px; }

        /* 입력 영역 */
        .answer-zone { background: #fdf4ff; padding: 25px; border-radius: 20px; border: 2px dashed #f5d0fe; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.5rem; margin-top: 15px; }
        .fraction-input { display: flex; flex-direction: column; align-items: center; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input { width: 60px; text-align: center; font-size: 1.5rem; border: 2px solid #f5d0fe; border-radius: 8px; padding: 5px; outline: none; }
        input:focus { border-color: #d946ef; }
        .line { width: 50px; height: 2px; background: #475569; margin: 5px 0; }

        button { background: #d946ef; color: white; border: none; padding: 20px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #c026d3; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count">문제 1 / 10</span>
                <span id="q-score">정답: 0</span>
            </div>
            <div class="problem-box" id="display">로딩 중...</div>
            
            <div class="answer-zone">
                <strong style="color:#701a75">정답을 기약분수로 입력하세요</strong>
                <div class="input-row">
                    <div class="fraction-input">
                        <input type="number" id="a-n" placeholder="분자">
                        <div class="line"></div>
                        <input type="number" id="a-d" placeholder="분모" value="1">
                    </div>
                    <span>x + </span>
                    <div class="fraction-input">
                        <input type="number" id="b-n" placeholder="분자">
                        <div class="line"></div>
                        <input type="number" id="b-d" placeholder="분모" value="1">
                    </div>
                </div>
                <button onclick="check()">정답 확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden">
            <h1 style="color:#d946ef">학습 종료! 🎉</h1>
            <div style="font-size: 5rem; font-weight: 900; margin: 30px 0;" id="final-score">0</div>
            <button onclick="location.reload()">다시 하기</button>
        </div>
    </div>

    <script>
        // 분수가 포함된 일차식 문제 세트 (학습지 유형 반영)
        const problems = [
            { h: `<div class="frac"><div class="num">1</div><div class="den">2</div></div>(4x - 6) + 3x`, an: 5, ad: 1, bn: -3, bd: 1 },
            { h: `2(x + <div class="frac"><div class="num">1</div><div class="den">2</div></div>) - <div class="frac"><div class="num">1</div><div class="den">3</div></div>(3x + 9)`, an: 1, ad: 1, bn: -2, bd: 1 },
            { h: `<div class="frac"><div class="num">2</div><div class="den">3</div></div>x + <div class="frac"><div class="num">1</div><div class="den">6</div></div>x`, an: 5, ad: 6, bn: 0, bd: 1 },
            { h: `<div class="frac"><div class="num">3</div><div class="den">4</div></div>(8x - 4) - 2x`, an: 4, ad: 1, bn: -3, bd: 1 },
            { h: `-(x - <div class="frac"><div class="num">2</div><div class="den">5</div></div>) + <div class="frac"><div class="num">1</div><div class="den">2</div></div>x`, an: -1, ad: 2, bn: 2, bd: 5 },
            { h: `<div class="frac"><div class="num">x+1</div><div class="den">2</div></div> + <div class="frac"><div class="num">x-1</div><div class="den">3</div></div>`, an: 5, ad: 6, bn: 1, bd: 6 },
            { h: `<div class="frac"><div class="num">1</div><div class="den">4</div></div>(4x + 8) - <div class="frac"><div class="num">1</div><div class="den">2</div></div>x`, an: 1, ad: 2, bn: 2, bd: 1 },
            { h: `3(<div class="frac"><div class="num">1</div><div class="den">3</div></div>x - 2) + 5`, an: 1, ad: 1, bn: -1, bd: 1 },
            { h: `<div class="frac"><div class="num">2x</div><div class="den">5</div></div> - <div class="frac"><div class="num">x</div><div class="den">2</div></div>`, an: -1, ad: 10, bn: 0, bd: 1 },
            { h: `<div class="frac"><div class="num">3</div><div class="den">2</div></div>x + <div class="frac"><div class="num">1</div><div class="den">4</div></div> - x`, an: 1, ad: 2, bn: 1, bd: 4 }
        ];

        let idx = 1; let score = 0; let cur;

        function load() {
            cur = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('display').innerHTML = cur.h;
        }

        function check() {
            const an = parseInt(document.getElementById('a-n').value);
            const ad = parseInt(document.getElementById('a-d').value);
            const bn = parseInt(document.getElementById('b-n').value);
            const bd = parseInt(document.getElementById('b-d').value);

            if([an, ad, bn, bd].some(isNaN)) return alert("모든 칸을 채워주세요! (정수는 분모에 1)");

            if(an === cur.an && ad === cur.ad && bn === cur.bn && bd === cur.bd) {
                score++; alert("정답입니다! 분수 계산도 완벽하시네요! ✨");
            } else {
                alert(`오답입니다. 정답은 (${cur.an}/${cur.ad})x + (${cur.bn}/${cur.bd}) 입니다.`);
            }

            if(idx < 10) {
                idx++;
                document.getElementById('q-count').innerText = `문제 ${idx} / 10`;
                document.getElementById('q-score').innerText = `정답: ${score}`;
                ['a-n','b-n'].forEach(id => document.getElementById(id).value = "");
                ['a-d','b-d'].forEach(id => document.getElementById(id).value = "1");
                load();
            } else {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('result-ui').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }
        window.onload = load;
    </script>
</body>
</html>
