<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일차식 계산 트레이닝</title>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 600px; text-align: center; border-top: 10px solid var(--primary); }
        .header { display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: bold; color: #065f46; }
        .problem-box { background: #f0fdf4; border-radius: 20px; padding: 45px 15px; margin-bottom: 30px; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; font-weight: bold; color: #1e293b; line-height: 1.5; }
        
        .f-wrap { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; line-height: 1.1; margin: 0 5px; font-size: 0.75em; }
        .f-num { border-bottom: 3px solid #1e293b; padding: 0 5px; }
        .f-den { padding: 0 5px; }

        .answer-zone { background: #f9fafb; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .ans-unit { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .ans-input { width: 80px; text-align: center; font-size: 1.4rem; padding: 8px; border: 2px solid #cbd5e1; border-radius: 10px; outline: none; }
        .ans-line { width: 100%; border-bottom: 2px solid #1e293b; margin: 4px 0; }
        .input-group { display: inline-flex; align-items: center; gap: 10px; font-size: 2rem; font-weight: bold; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #059669; margin-top: 20px; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        .result-card { display: none; }
        .score-box { background: #dcfce7; padding: 30px; border-radius: 20px; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count">문제 1 / 10</span>
                <span>일차식 계산 마스터</span>
            </div>
            <div class="problem-box" id="display">...</div>
            
            <div class="answer-zone">
                <div class="input-group">
                    <div class="ans-unit">
                        <input type="number" id="a-num" class="ans-input" placeholder="분자">
                        <div class="ans-line"></div>
                        <input type="number" id="a-den" class="ans-input" value="1">
                    </div>
                    <span>x + </span>
                    <div class="ans-unit">
                        <input type="number" id="b-num" class="ans-input" placeholder="분자">
                        <div class="ans-line"></div>
                        <input type="number" id="b-den" class="ans-input" value="1">
                    </div>
                </div>
                <button class="btn-main" onclick="check()">확인</button>
            </div>
        </div>

        <div id="result-ui" class="result-card">
            <h2 style="color:#065f46;">학습 결과 통계 📊</h2>
            <div class="score-box">
                <div style="font-size:4rem; font-weight:900;" id="set-score">0 / 10</div>
            </div>
            <button class="btn-main" onclick="location.reload()">다시 시작하기</button>
        </div>
    </div>

    <script>
        let session = { idx: 1, score: 0 };
        let currentAns = { aN: 0, aD: 1, bN: 0, bD: 1 };

        function getGCD(a, b) { return b === 0 ? Math.abs(a) : getGCD(b, a % b); }
        function simplify(n, d) {
            const common = getGCD(n, d);
            let num = n / common;
            let den = d / common;
            if (den < 0) { num = -num; den = -den; }
            return [num, den];
        }

        // 수식 렌더링 함수: 1과 -1을 완벽하게 처리
        function renderTerm(n, d, type, isFirst) {
            if (n === 0) return "";
            const [sn, sd] = simplify(n, d);
            let absN = Math.abs(sn);
            let sign = sn > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
            
            let valStr = "";
            if (sd === 1) {
                if (type === 'x') {
                    valStr = (absN === 1 ? "x" : absN + "x");
                } else {
                    valStr = absN;
                }
            } else {
                valStr = `<div class="f-wrap"><div class="f-num">${absN}</div><div class="f-den">${sd}</div></div>` + (type === 'x' ? "x" : "");
            }
            return sign + valStr;
        }

        function generate() {
            let m = (Math.floor(Math.random() * 4) + 2) * (Math.random() > 0.5 ? 1 : -1);
            let n = (Math.floor(Math.random() * 4) + 2) * (Math.random() > 0.5 ? 1 : -1);
            
            let aN = rand(1, 3), aD = rand(1, 3);
            let bN = rand(-4, 4), bD = rand(1, 2); if(bN === 0) bN = 2;
            let cN = rand(1, 3), cD = rand(1, 3);
            let dN = rand(-4, 4), dD = rand(1, 2); if(dN === 0) dN = -2;

            const [saN, saD] = simplify(aN, aD);
            const [sbN, sbD] = simplify(bN, bD);
            const [scN, scD] = simplify(cN, cD);
            const [sdN, sdD] = simplify(dN, dD);

            let mStr = m === 1 ? "" : m === -1 ? "-" : m;
            let nSign = n > 0 ? " + " : " - ";
            let nVal = Math.abs(n) === 1 ? "" : Math.abs(n);

            let term1 = renderTerm(saN, saD, 'x', true) + renderTerm(sbN, sbD, 'n', false);
            let term2 = renderTerm(scN, scD, 'x', true) + renderTerm(sdN, sdD, 'n', false);

            document.getElementById('display').innerHTML = `${mStr}(${term1})${nSign}${nVal}(${term2})`;

            [currentAns.aN, currentAns.aD] = simplify(m * saN * scD + n * scN * saD, saD * scD);
            [currentAns.bN, currentAns.bD] = simplify(m * sbN * sdD + n * sdN * sbD, sbD * sdD);
        }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function check() {
            const an = parseInt(document.getElementById('a-num').value);
            const ad = parseInt(document.getElementById('a-den').value) || 1;
            const bn = parseInt(document.getElementById('b-num').value);
            const bd = parseInt(document.getElementById('b-den').value) || 1;

            if (isNaN(an) || isNaN(bn)) return alert("정답을 입력하세요!");

            const [uan, uad] = simplify(an, ad);
            const [ubn, ubd] = simplify(bn, bd);

            if (uan === currentAns.aN && uad === currentAns.aD && ubn === currentAns.bN && ubd === currentAns.bD) {
                session.score++; alert("정답입니다! ✨");
            } else {
                // 오답 메시지에서도 1 생략 적용
                let showA = renderTerm(currentAns.aN, currentAns.aD, 'x', true);
                let showB = renderTerm(currentAns.bN, currentAns.bD, 'n', false);
                alert(`오답! 정답은 [ ${showA}${showB} ] 입니다.`);
            }

            if (session.idx < 10) {
                session.idx++;
                document.getElementById('q-count').innerText = `문제 ${session.idx} / 10`;
                clearInputs(); generate();
            } else {
                document.getElementById('quiz-ui').style.display = 'none';
                document.getElementById('result-ui').style.display = 'block';
                document.getElementById('set-score').innerText = `${session.score} / 10`;
            }
        }

        function clearInputs() {
            document.getElementById('a-num').value = ""; document.getElementById('a-den').value = "1";
            document.getElementById('b-num').value = ""; document.getElementById('b-den').value = "1";
        }

        window.onload = generate;
    </script>
</body>
</html>
