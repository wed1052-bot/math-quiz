<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일차식 계산 트레이닝</title>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 550px; text-align: center; border-top: 10px solid var(--primary); }
        
        .header { display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: bold; color: #065f46; }
        .problem-box { background: #f0fdf4; border-radius: 20px; padding: 50px 20px; margin-bottom: 30px; min-height: 160px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; font-weight: bold; color: #1e293b; }
        
        /* 분수 디자인 */
        .f-wrap { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; line-height: 1.1; margin: 0 10px; font-size: 0.8em; }
        .f-num { border-bottom: 3px solid #1e293b; padding: 0 5px; }
        .f-den { padding: 0 5px; }

        .answer-zone { background: #f9fafb; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .input-row { display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 2.2rem; margin-bottom: 20px; }
        input[type="number"] { width: 110px; text-align: center; font-size: 1.8rem; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; outline: none; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #059669; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        /* 결과 창 (이미지 디자인 반영) */
        .result-card { display: none; }
        .name-box { border: 2px solid var(--primary); border-radius: 12px; padding: 10px; margin-bottom: 20px; color: #94a3b8; font-size: 1.2rem; }
        .score-box { background: #dcfce7; padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-item { background: #f0fdf4; padding: 15px; border-radius: 12px; }
        .stat-label { font-size: 0.85rem; color: #065f46; font-weight: bold; margin-bottom: 5px; }
        .stat-val { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="q-count">문제 1 / 10</span>
                <span>일차식 계산</span>
            </div>
            <div class="problem-box" id="display">생성 중...</div>
            <div class="answer-zone">
                <div class="input-row">
                    <input type="number" id="ans-a" placeholder="계수">
                    <span>x + </span>
                    <input type="number" id="ans-b" placeholder="상수">
                </div>
                <button class="btn-main" onclick="check()">확인</button>
            </div>
        </div>

        <div id="result-ui" class="result-card">
            <h2 style="color:#065f46;">학습 결과 통계 📊</h2>
            <div class="name-box">학생 이름</div>
            <div class="score-box">
                <div style="color:#065f46; font-weight:bold; margin-bottom:10px;">이번 세트 점수</div>
                <div style="font-size:4rem; font-weight:900;" id="set-score">0 / 10</div>
            </div>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-label">총 세트</div><div class="stat-val" id="total-sets">0</div></div>
                <div class="stat-item"><div class="stat-label">총 정답</div><div class="stat-val" id="total-correct">0</div></div>
                <div class="stat-item"><div class="stat-label">정답률</div><div class="stat-val" id="total-rate">0%</div></div>
            </div>
            <button class="btn-main" onclick="startNewSet()">다음 세트 계속하기</button>
        </div>
    </div>

    <script>
        let global = { sets: 0, correct: 0 };
        let session = { idx: 1, score: 0 };
        let currentAns = { a: 0, b: 0 };

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function fmtX(n, isFirst = false) {
            if (n === 0) return "";
            let sign = n > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
            let val = Math.abs(n) === 1 ? "x" : Math.abs(n) + "x";
            return sign + val;
        }

        function fmtNum(n, isFirst = false) {
            if (n === 0) return "";
            let sign = n > 0 ? (isFirst ? "" : " + ") : (isFirst ? " - " : " - ");
            return sign + Math.abs(n);
        }

        function generate() {
            let type = rand(1, 3);
            let html = "";

            if (type === 1) { // 괄호 분배: a(bx + c) + dx
                let a = rand(-5, 5); if(Math.abs(a) <= 1) a = 2; // 1 생략 문제 방지
                let b = rand(1, 4);
                let c = rand(-9, 9);
                let d = rand(-5, 5) || 1;
                html = `${a}(${b===1?'x':b+'x'} ${fmtNum(c)}) ${fmtX(d)}`;
                currentAns.a = (a * b) + d;
                currentAns.b = a * c;
            } 
            else if (type === 2) { // ★분수 문제★: n/d(mx + k)
                let den = rand(2, 6);
                let num = rand(1, den - 1);
                let m = den * rand(1, 3);
                let k = den * rand(-2, 2) || den;
                html = `<div class="f-wrap"><div class="f-num">${num}</div><div class="f-den">${den}</div></div>(${m}x ${fmtNum(k)})`;
                currentAns.a = (num / den) * m;
                currentAns.b = (num / den) * k;
            }
            else { // 다항식 결합: ax + b + cx + d
                let a = rand(-9, 9) || 3;
                let b = rand(-9, 9);
                let c = rand(-9, 9) || -4;
                let d = rand(-9, 9);
                html = `${fmtX(a, true)} ${fmtNum(b)} ${fmtX(c)} ${fmtNum(d)}`;
                currentAns.a = a + c;
                currentAns.b = b + d;
            }
            document.getElementById('display').innerHTML = html;
        }

        function check() {
            const ua = parseInt(document.getElementById('ans-a').value);
            const ub = parseInt(document.getElementById('ans-b').value);
            if(isNaN(ua) || isNaN(ub)) return;

            if(ua === currentAns.a && ub === currentAns.b) {
                session.score++; alert("정답입니다! ✨");
            } else {
                alert(`오답! 정답은 ${currentAns.a}x ${currentAns.b >= 0 ? '+ ' + currentAns.b : '- ' + Math.abs(currentAns.b)}`);
            }

            if(session.idx < 10) {
                session.idx++;
                document.getElementById('q-count').innerText = `문제 ${session.idx} / 10`;
                document.getElementById('ans-a').value = ""; document.getElementById('ans-b').value = "";
                generate();
            } else { showResult(); }
        }

        function showResult() {
            global.sets++; global.correct += session.score;
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('set-score').innerText = `${session.score} / 10`;
            document.getElementById('total-sets').innerText = global.sets;
            document.getElementById('total-correct').innerText = global.correct;
            document.getElementById('total-rate').innerText = Math.round((global.correct / (global.sets * 10)) * 100) + "%";
        }

        function startNewSet() {
            session.idx = 1; session.score = 0;
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('q-count').innerText = "문제 1 / 10";
            document.getElementById('ans-a').value = ""; document.getElementById('ans-b').value = "";
            generate();
        }

        window.onload = generate;
    </script>
</body>
</html>
