<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유리수 혼합계산 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@800&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f0f7ff; }
        
        /* 분수 디자인: 표(Table) 방식을 사용하여 절대 깨지지 않게 함 */
        .frac-container { display: inline-table; vertical-align: middle; border-collapse: collapse; margin: 0 5px; }
        .num-part { text-align: center; font-size: 2.2rem; color: #1e40af; border-bottom: 3px solid #1e40af; padding: 0 5px; }
        .den-part { text-align: center; font-size: 2.2rem; color: #1e40af; padding: 0 5px; }
        .int-part { font-size: 2.8rem; font-weight: 800; color: #1e40af; padding: 0 10px; }
        .op-part { font-size: 2.5rem; color: #e11d48; font-weight: 800; margin: 0 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-3xl border-t-8 border-blue-600">
        <div class="flex justify-between items-center mb-6">
            <span id="step-info" class="text-blue-600 text-xl font-bold">문제 1 / 10</span>
            <span id="score-info" class="text-green-600 text-xl font-bold">정답: 0</span>
        </div>

        <div id="quiz-screen" class="bg-slate-50 rounded-3xl p-10 text-center mb-8 border-2 border-slate-100 min-h-[180px] flex items-center justify-center">
            <div id="math-box" class="flex flex-wrap items-center justify-center">
                </div>
        </div>

        <div class="bg-blue-50 p-8 rounded-3xl border-2 border-blue-100">
            <div class="flex flex-col md:flex-row items-center justify-around gap-6">
                <div class="text-center">
                    <p class="text-blue-800 font-bold mb-4">정답을 분수로 입력</p>
                    <div class="flex flex-col items-center">
                        <input type="number" id="user-n" placeholder="분자" class="w-28 text-center text-2xl p-3 border-2 border-blue-400 rounded-xl outline-none">
                        <div class="w-full h-1 bg-blue-300 my-2"></div>
                        <input type="number" id="user-d" placeholder="분모" class="w-28 text-center text-2xl p-3 border-2 border-blue-400 rounded-xl outline-none">
                    </div>
                </div>
                <button id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white text-3xl px-12 py-10 rounded-3xl shadow-xl font-black transition-transform active:scale-95">정답 확인</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1; let totalScore = 0; let finalAns = { n: 0, d: 1 };

        function getGCD(a, b) { return b === 0 ? a : getGCD(b, a % b); }

        function renderVal(n, d) {
            if (d === 1) return `<div class="int-part">${n < 0 ? '('+n+')' : n}</div>`;
            return `<table class="frac-container"><tr><td class="num-part">${n}</td></tr><tr><td class="den-part">${d}</td></tr></table>`;
        }

        function buildQuiz() {
            // 숫자를 2개로 줄여 로직 오류 방지 (하지만 유리수 사칙연산은 완벽 포함)
            let n1 = (Math.floor(Math.random() * 15) - 7) || 2;
            let d1 = Math.random() > 0.5 ? 1 : Math.floor(Math.random() * 7) + 2;
            let n2 = (Math.floor(Math.random() * 15) - 7) || 3;
            let d2 = Math.random() > 0.5 ? 1 : Math.floor(Math.random() * 7) + 2;
            
            const ops = ['+', '-', '×', '÷'];
            const op = ops[Math.floor(Math.random() * 4)];

            let rn, rd;
            if(op === '+') { rn = n1*d2 + n2*d1; rd = d1*d2; }
            else if(op === '-') { rn = n1*d2 - n2*d1; rd = d1*d2; }
            else if(op === '×') { rn = n1*n2; rd = d1*d2; }
            else { rn = n1*d2; rd = d1*n2; }

            if(rd === 0) { buildQuiz(); return; } // 분모 0 방지

            let common = getGCD(Math.abs(rn), Math.abs(rd));
            finalAns.n = rn / common; finalAns.d = rd / common;
            if(finalAns.d < 0) { finalAns.n *= -1; finalAns.d *= -1; }

            document.getElementById('math-box').innerHTML = `
                ${renderVal(n1, d1)} <div class="op-part">${op}</div> ${renderVal(n2, d2)} <div class="op-part">=</div>
            `;
        }

        document.getElementById('submit-btn').onclick = () => {
            const un = parseInt(document.getElementById('user-n').value);
            const ud = parseInt(document.getElementById('user-d').value);
            if(isNaN(un) || isNaN(ud)) { alert("정답을 입력하세요!"); return; }

            let common = getGCD(Math.abs(un), Math.abs(ud));
            let sun = un/common; let sud = ud/common;
            if(sud < 0) { sun *= -1; sud *= -1; }

            if(sun === finalAns.n && sud === finalAns.d) {
                totalScore++; alert("정답입니다! 잘했어요. 👍");
            } else {
                alert(`아쉬워요! 정답은 ${finalAns.n}/${finalAns.d} 입니다.`);
            }

            if(currentStep < 10) {
                currentStep++;
                document.getElementById('step-info').innerText = `문제 ${currentStep} / 10`;
                document.getElementById('score-info').innerText = `정답: ${totalScore}`;
                document.getElementById('user-n').value = ""; document.getElementById('user-d').value = "";
                buildQuiz();
            } else {
                alert(`최종 점수: ${totalScore} / 10\n기록이 완료되었습니다. 화면을 캡처하세요!`);
                location.reload();
            }
        };

        // 페이지 로드 시 즉시 문제 생성
        window.onload = buildQuiz;
    </script>
</body>
</html>
