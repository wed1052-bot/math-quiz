<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유리수 혼합계산 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@800&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background: #f0f2f5; }
        .math-v { font-size: 2.8rem; font-weight: 800; color: #1a202c; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1; margin: 0 5px; }
        .num { border-bottom: 3px solid #1a202c; padding: 0 5px; font-size: 2.4rem; }
        .den { padding: 0 5px; font-size: 2.4rem; }
        .op { font-size: 2.8rem; font-weight: 900; color: #2563eb; }
        .sup { font-size: 1.5rem; vertical-align: super; color: #e11d48; margin-left: 2px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="app-container" class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-3xl border-t-[10px] border-indigo-600">
        <div id="quiz-part">
            <div class="flex justify-between items-center mb-8">
                <span id="step-txt" class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full font-bold">문제 1 / 10</span>
                <span id="score-txt" class="text-emerald-600 font-bold">정답 개수: 0</span>
            </div>

            <div class="bg-gray-50 rounded-[30px] p-10 min-h-[250px] flex items-center justify-center mb-10 border-2 border-gray-100 shadow-inner">
                <div id="problem-area" class="math-v">
                    </div>
            </div>

            <div class="bg-indigo-50 p-8 rounded-[30px] flex flex-col md:flex-row items-center justify-around gap-6">
                <div class="text-center">
                    <p class="text-indigo-900 font-bold mb-4 italic text-sm">기약분수로 입력 (정수는 분모 1)</p>
                    <div class="inline-flex flex-col items-center bg-white p-4 rounded-2xl shadow-sm">
                        <input type="number" id="in-n" placeholder="분자" class="w-24 text-center text-3xl outline-none border-b-2 border-gray-200 focus:border-indigo-500 p-2">
                        <div class="w-32 h-1 bg-gray-800 my-2"></div>
                        <input type="number" id="in-d" placeholder="분모" class="w-24 text-center text-3xl outline-none border-t-2 border-gray-200 focus:border-indigo-500 p-2">
                    </div>
                </div>
                <button id="btn-submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-4xl px-12 py-10 rounded-3xl font-black shadow-lg transition-transform active:scale-95">확인</button>
            </div>
        </div>

        <div id="result-part" class="hidden text-center py-4">
            <h2 class="text-5xl font-black text-indigo-600 mb-2">학습 완료!</h2>
            <p class="text-gray-400 mb-8 font-bold">유리수 혼합계산 마스터 과정</p>
            
            <div class="bg-indigo-600 text-white p-10 rounded-[40px] mb-8 shadow-xl">
                <p class="text-xl opacity-80 mb-2">당신의 점수는</p>
                <p class="text-9xl font-black mb-6"><span id="final-val">0</span><span class="text-3xl"> / 10</span></p>
                <input type="text" id="s-name" placeholder="학생 이름을 입력하세요" class="w-full text-center text-2xl p-4 rounded-2xl text-indigo-900 font-bold outline-none">
            </div>
            
            <button onclick="window.print()" class="w-full bg-emerald-500 text-white text-2xl py-6 rounded-2xl font-bold shadow-lg mb-4">리포트 인쇄 / PDF 저장</button>
            <button onclick="location.reload()" class="text-gray-400 font-bold">다시 풀기</button>
        </div>
    </div>

    <script>
        // 학습지 수준의 검증된 문제 데이터셋 (오류 원천 차단)
        const db = [
            { h: `(-2) <span class="op">×</span> <div class="frac"><div class="num">3</div><div class="den">4</div></div> <span class="op">÷</span> <div class="frac"><div class="num">1</div><div class="den">2</div></div>`, n: -3, d: 1 },
            { h: `14 <span class="op">×</span> { <div class="frac"><div class="num">-3</div><div class="den">2</div></div> <span class="op">+</span> <div class="frac"><div class="num">2</div><div class="den">7</div></div> }`, n: -17, d: 1 },
            { h: `9 <span class="op">-</span> { 5 <span class="op">+</span> (-2)<span class="sup">3</span> } <span class="op">×</span> (-7)`, n: -12, d: 1 },
            { h: `(-2)<span class="sup">3</span> <span class="op">×</span> <div class="frac"><div class="num">5</div><div class="den">8</div></div> <span class="op">÷</span> <div class="frac"><div class="num">-5</div><div class="den">6</div></div>`, n: 6, d: 1 },
            { h: `<div class="frac"><div class="num">1</div><div class="den">3</div></div> <span class="op">-</span> <div class="frac"><div class="num">5</div><div class="den">6</div></div> <span class="op">+</span> <div class="frac"><div class="num">1</div><div class="den">2</div></div>`, n: 0, d: 1 },
            { h: `(-4) <span class="op">+</span> (+7) <span class="op">-</span> (+10)`, n: -7, d: 1 },
            { h: `(-2) <span class="op">×</span> (+5) <span class="op">÷</span> (-10)`, n: 1, d: 1 },
            { h: `<div class="frac"><div class="num">5</div><div class="den">6</div></div> <span class="op">÷</span> (<div class="frac"><div class="num">-2</div><div class="den">3</div></div>)`, n: -5, d: 4 },
            { h: `(-3) <span class="op">-</span> (-7) <span class="op">+</span> (-5)`, n: -1, d: 1 },
            { h: `<div class="frac"><div class="num">-3</div><div class="den">4</div></div> <span class="op">×</span> (<div class="frac"><div class="num">-8</div><div class="den">9</div></div>)`, n: 2, d: 3 },
            { h: `(-1)<span class="sup">2</span> <span class="op">-</span> (-2)<span class="sup">3</span>`, n: 9, d: 1 },
            { h: `12 <span class="op">÷</span> { (-2) <span class="op">-</span> 1 }`, n: -4, d: 1 }
        ];

        let step = 1; let score = 0; let current;

        function next() {
            current = db[Math.floor(Math.random() * db.length)];
            document.getElementById('problem-area').innerHTML = current.h + ` <span class="op">=</span>`;
        }

        document.getElementById('btn-submit').onclick = () => {
            const un = parseInt(document.getElementById('in-n').value);
            const ud = parseInt(document.getElementById('in-d').value);
            if(isNaN(un) || isNaN(ud)) return;

            if(un === current.n && ud === current.d) {
                score++; alert("정답입니다! 🎯");
            } else {
                alert(`아쉬워요. 정답은 ${current.n}${current.d === 1 ? '' : '/' + current.d} 입니다.`);
            }

            if(step < 10) {
                step++;
                document.getElementById('step-txt').innerText = `문제 ${step} / 10`;
                document.getElementById('score-txt').innerText = `정답 개수: ${score}`;
                document.getElementById('in-n').value = ""; document.getElementById('in-d').value = "";
                next();
            } else {
                document.getElementById('quiz-part').classList.add('hidden');
                document.getElementById('result-part').classList.remove('hidden');
                document.getElementById('final-val').innerText = score;
            }
        };

        window.onload = next;
    </script>
</body>
</html>
