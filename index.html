<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유리수 혼합계산 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@800&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background: #f8fafc; }
        .math-v { font-size: 3rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 4px; }
        .num { border-bottom: 3px solid #1e293b; padding: 0 4px; line-height: 1; }
        .den { padding: 0 4px; line-height: 1; }
        .sup { font-size: 1.5rem; vertical-align: super; color: #ef4444; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-10 rounded-[50px] shadow-2xl w-full max-w-3xl border-t-[12px] border-blue-600">
        <div id="quiz-ui">
            <div class="flex justify-between mb-8">
                <span id="step-info" class="text-blue-600 font-bold text-xl">문제 1 / 10</span>
                <span id="score-info" class="text-green-600 font-bold text-xl">정답: 0</span>
            </div>

            <div class="bg-slate-50 rounded-[40px] p-12 text-center mb-10 min-h-[280px] flex items-center justify-center border-2 border-slate-100 shadow-inner">
                <div id="display-area" class="math-v">
                    </div>
            </div>

            <div class="bg-blue-50 p-8 rounded-[40px] flex flex-col md:flex-row items-center justify-center gap-10">
                <div class="text-center">
                    <p class="text-blue-900 font-black mb-4">정답 (기약분수)</p>
                    <div class="bg-white p-6 rounded-3xl shadow-md inline-flex flex-col items-center">
                        <input type="number" id="ans-n" placeholder="분자" class="w-28 text-center text-3xl p-2 outline-none border-b-2 border-blue-200 focus:border-blue-500">
                        <div class="w-32 h-1 bg-slate-800 my-4"></div>
                        <input type="number" id="ans-d" placeholder="분모" class="w-28 text-center text-3xl p-2 outline-none border-t-2 border-blue-200 focus:border-blue-500">
                    </div>
                </div>
                <button id="btn-next" class="bg-blue-600 hover:bg-blue-700 text-white text-5xl px-14 py-12 rounded-[40px] font-black shadow-xl active:scale-95 transition-transform">확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden text-center py-6">
            <h2 class="text-6xl font-black text-blue-600 mb-6">학습 완료! 🎉</h2>
            <div class="bg-blue-600 text-white p-12 rounded-[50px] shadow-2xl mb-8">
                <p class="text-2xl mb-2 italic">최종 점수</p>
                <p class="text-[10rem] font-black leading-none mb-6" id="final-score">0</p>
                <input type="text" id="user-name" placeholder="학생 이름을 입력하세요" class="w-full text-center text-3xl p-5 rounded-2xl text-blue-900 font-bold outline-none">
            </div>
            <button onclick="window.print()" class="w-full bg-emerald-500 text-white text-3xl py-7 rounded-3xl font-black shadow-lg mb-4">리포트 저장 및 인쇄</button>
            <button onclick="location.reload()" class="text-slate-400 font-bold underline">다시 시작하기</button>
        </div>
    </div>

    <script>
        // 학습지 7, 8, 9, 10번 고난도 유형 완벽 복제 데이터
        const problemPool = [
            { q: `(-2) × <div class="frac"><div class="num">3</div><div class="den">4</div></div> ÷ <div class="frac"><div class="num">1</div><div class="den">2</div></div>`, n: -3, d: 1 },
            { q: `14 × { <div class="frac"><div class="num">-3</div><div class="den">2</div></div> + <div class="frac"><div class="num">2</div><div class="den">7</div></div> }`, n: -17, d: 1 },
            { q: `9 - { 5 + (-2)<span class="sup">3</span> } × (-7)`, n: -12, d: 1 },
            { q: `(-2)<span class="sup">3</span> × <div class="frac"><div class="num">5</div><div class="den">8</div></div> ÷ <div class="frac"><div class="num">-5</div><div class="den">6</div></div>`, n: 6, d: 1 },
            { q: `(-3)<span class="sup">2</span> - { 10 + (-2) × 3 }`, n: 5, d: 1 },
            { q: `<div class="frac"><div class="num">3</div><div class="den">4</div></div> ÷ <div class="frac"><div class="num">-9</div><div class="den">8</div></div> + 1`, n: 1, d: 3 },
            { q: `(-1)<span class="sup">100</span> + (-1)<span class="sup">101</span> × 5`, n: -4, d: 1 },
            { q: `{ 1 - <div class="frac"><div class="num">2</div><div class="den">3</div></div> } ÷ <div class="frac"><div class="num">5</div><div class="den">6</div></div>`, n: 2, d: 5 },
            { q: `(-5) × <div class="frac"><div class="num">1</div><div class="den">10</div></div> - (-2)`, n: 3, d: 2 },
            { q: `8 × <div class="frac"><div class="num">-3</div><div class="den">4</div></div> ÷ (-6)`, n: 1, d: 1 }
        ];

        let idx = 1; let score = 0; let cur;

        function load() {
            // 문제를 무작위로 섞어서 출제
            cur = problemPool[Math.floor(Math.random() * problemPool.length)];
            document.getElementById('display-area').innerHTML = cur.q + ` <span class="text-blue-500 ml-4">=</span>`;
        }

        document.getElementById('btn-next').onclick = () => {
            const un = parseInt(document.getElementById('ans-n').value);
            const ud = parseInt(document.getElementById('ans-d').value);
            if(isNaN(un) || isNaN(ud)) return;

            if(un === cur.n && ud === cur.d) {
                score++; alert("정답입니다! 😊");
            } else {
                alert(`오답입니다. 정답은 ${cur.n}${cur.d === 1 ? '' : '/' + cur.d} 입니다.`);
            }

            if(idx < 10) {
                idx++;
                document.getElementById('step-info').innerText = `문제 ${idx} / 10`;
                document.getElementById('score-info').innerText = `정답: ${score}`;
                document.getElementById('ans-n').value = ""; document.getElementById('ans-d').value = "";
                load();
            } else {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('result-ui').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        };

        window.onload = load; // 페이지 로드 즉시 실행
    </script>
</body>
</html>
