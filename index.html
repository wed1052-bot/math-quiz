<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중등 유리수 혼합계산 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@800&display=swap');

        .math-text { font-size: 2.8rem; font-weight: 800; color: #1e293b; }
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; margin: 0 6px; }
        .num { border-bottom: 3px solid #1e293b; padding: 0 6px; line-height: 1.1; font-size: 2.4rem; }
        .den { padding: 0 6px; line-height: 1.1; font-size: 2.4rem; }
        .sup { font-size: 1.6rem; vertical-align: super; color: #ef4444; margin-left: 2px; }
        .op { margin: 0 12px; color: #2563eb; font-weight: 900; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="app" class="bg-white p-10 rounded-[50px] shadow-2xl w-full max-w-4xl border-b-[12px] border-indigo-600">
        <div id="quiz-ui">
            <div class="flex justify-between items-center mb-10">
                <div class="px-6 py-2 bg-indigo-100 text-indigo-700 rounded-full text-xl font-black" id="q-num">문제 1 / 10</div>
                <div class="text-emerald-600 text-2xl font-black" id="q-score">맞은 개수: 0</div>
            </div>

            <div class="bg-slate-50 rounded-[40px] p-16 text-center mb-12 min-h-[300px] flex items-center justify-center border-4 border-dashed border-slate-200">
                <div id="problem-display" class="math-text flex flex-wrap items-center justify-center leading-loose">
                    </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-end bg-indigo-50 p-10 rounded-[40px]">
                <div class="flex flex-col items-center">
                    <span class="text-indigo-900 font-black mb-6 text-xl">정답 입력 (기약분수)</span>
                    <div class="flex flex-col items-center bg-white p-6 rounded-3xl shadow-md">
                        <input type="number" id="input-n" placeholder="분자" class="w-32 text-center text-4xl p-2 outline-none border-b-4 border-indigo-200 focus:border-indigo-500">
                        <div class="w-40 h-1.5 bg-slate-800 my-4"></div>
                        <input type="number" id="input-d" placeholder="분모" class="w-32 text-center text-4xl p-2 outline-none border-t-4 border-indigo-200 focus:border-indigo-500">
                    </div>
                </div>
                <button id="check-btn" class="h-32 bg-indigo-600 hover:bg-indigo-700 text-white text-5xl rounded-[30px] shadow-xl font-black transition-all active:scale-95">확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden text-center">
            <h1 class="text-7xl font-black text-indigo-600 mb-6">Excellent!</h1>
            <p class="text-2xl text-slate-500 mb-12">유리수 혼합계산 학습 결과 리포트</p>
            
            <div class="bg-indigo-900 text-white p-12 rounded-[50px] shadow-2xl mb-10">
                <p class="text-3xl font-bold mb-4">최종 성적</p>
                <p class="text-[12rem] font-black leading-none mb-8" id="final-score">0</p>
                <div class="flex flex-col items-center gap-4">
                    <input type="text" id="student-name" placeholder="학생 이름을 입력하세요" class="w-full max-w-md text-center text-3xl p-5 rounded-2xl text-slate-900 font-bold">
                    <p class="text-indigo-300">위 학생은 중등 유리수 혼합계산 과정을 이수하였습니다.</p>
                </div>
            </div>
            <button onclick="window.print()" class="w-full bg-emerald-500 text-white text-3xl py-8 rounded-3xl font-black shadow-lg mb-6">결과 인쇄 및 PDF 저장</button>
            <button onclick="location.reload()" class="text-slate-400 font-bold text-xl hover:underline">다시 도전하기</button>
        </div>
    </div>

    <script>

            let core = d === 1 ? (n < 0 ? `(${n})` : `${n}`) : `<div class="frac"><div class="num">${n}</div><div class="den">${d}</div></div>`;

            return `<span>${core}</span>`;
        }

                    return { html: `9 <span class="op">-</span> { ${b} <span class="op">+</span> ${render(base, 1, p)} } <span class="op">×</span> (${d})`, ans: {n: ans_val, d: 1} };
                },

                    let v2 = {n: 5, d: 8};
                    let v3 = {n: -5, d: 6};

                },

                    let a = 14;
                    let v1 = {n: -3, d: 2};

                }
            ];

            let c = gcd(Math.abs(quiz.ans.n), Math.abs(quiz.ans.d));
