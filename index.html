<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유리수 계산 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap');
        body { font-family: 'Nanum Gothic', sans-serif; background-color: #f3f4f6; }
        .fraction { display: inline-block; vertical-align: middle; text-align: center; margin: 0 5px; }
        .fraction .numerator { border-bottom: 2px solid #374151; padding: 0 2px; }
        .fraction .denominator { padding: 0 2px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="quiz-container" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg">
        <div class="mb-6">
            <div class="flex justify-between text-sm mb-2 text-gray-500">
                <span id="progress-text">문제 1 / 10</span>
                <span id="score-text">맞은 개수: 0</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 10%"></div>
            </div>
        </div>

        <div id="question-area" class="text-center py-10">
            <div id="math-expr" class="text-3xl font-bold mb-8 flex items-center justify-center">
                </div>
            <div class="flex flex-col items-center gap-4">
                <div class="flex items-center gap-2 text-2xl font-bold">
                    <span>=</span>
                    <input type="number" id="ans-num" placeholder="분자" class="w-20 text-center border-b-4 border-blue-500 outline-none p-2">
                    <span class="text-gray-400">/</span>
                    <input type="number" id="ans-den" placeholder="분모" class="w-20 text-center border-b-4 border-blue-500 outline-none p-2">
                </div>
                <button id="next-btn" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition text-xl">
                    정답 확인 및 다음 문제
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center py-6">
            <h2 class="text-4xl font-extrabold text-blue-600 mb-4">학습 완료! 🎉</h2>
            <div class="bg-blue-50 p-6 rounded-2xl mb-6">
                <p class="text-xl mb-2">최종 점수: <span id="final-score" class="font-bold text-2xl">0</span> / 10</p>
                <p class="text-lg text-gray-600">성취도: <span id="grade">A</span></p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="student-name" placeholder="이름을 입력하세요" class="w-full p-4 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500">
                <button onclick="submitScore()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg transition">
                    선생님께 결과 제출하기
                </button>
                <button onclick="location.reload()" class="w-full text-gray-400 font-medium py-2">다시 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        let currentIdx = 1;
        let totalQuestions = 10;
        let correctCount = 0;
        let currentAnswer = {};

        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

        function simplify(n, d) {
            const common = gcd(Math.abs(n), Math.abs(d));
            const sign = (n * d >= 0) ? 1 : -1;
            return { num: sign * Math.abs(n) / common, den: Math.abs(d) / common };
        }

        function generateQuestion() {
            const n1 = Math.floor(Math.random() * 9) + 1;
            const d1 = Math.floor(Math.random() * 9) + 2;
            const n2 = Math.floor(Math.random() * 9) + 1;
            const d2 = Math.floor(Math.random() * 9) + 2;
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];

            let res;
            if(op === '+') res = simplify(n1*d2 + n2*d1, d1*d2);
            else if(op === '-') res = simplify(n1*d2 - n2*d1, d1*d2);
            else res = simplify(n1*n2, d1*d2);

            currentAnswer = res;

            document.getElementById('math-expr').innerHTML = `
                <div class="fraction"><span class="numerator">${n1}</span><span class="denominator">${d1}</span></div>
                <span class="mx-2">${op}</span>
                <div class="fraction"><span class="numerator">${n2}</span><span class="denominator">${d2}</span></div>
            `;
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            const uNum = parseInt(document.getElementById('ans-num').value);
            const uDen = parseInt(document.getElementById('ans-den').value);

            if(isNaN(uNum) || isNaN(uDen)) { alert("분자와 분모를 모두 입력해주세요!"); return; }

            const userRes = simplify(uNum, uDen);
            if(userRes.num === currentAnswer.num && userRes.den === currentAnswer.den) {
                correctCount++;
                alert("정답입니다! 😊");
            } else {
                alert(`아쉬워요! 정답은 ${currentAnswer.num}/${currentAnswer.den} 입니다.`);
            }

            if(currentIdx < totalQuestions) {
                currentIdx++;
                updateUI();
                generateQuestion();
                document.getElementById('ans-num').value = '';
                document.getElementById('ans-den').value = '';
            } else {
                showResult();
            }
        });

        function updateUI() {
            document.getElementById('progress-text').innerText = `문제 ${currentIdx} / ${totalQuestions}`;
            document.getElementById('score-text').innerText = `맞은 개수: ${correctCount}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / totalQuestions) * 100}%`;
        }

        function showResult() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = correctCount;
            let grade = 'C';
            if(correctCount >= 9) grade = 'A+';
            else if(correctCount >= 7) grade = 'B';
            document.getElementById('grade').innerText = grade;
        }

        function submitScore() {
            const name = document.getElementById('student-name').value;
            if(!name) { alert("이름을 입력해주세요!"); return; }
            alert(`${name} 학생의 기록(${correctCount}점)이 제출되었습니다!\n(실제 연동을 위해서는 구글 폼 설정이 필요합니다)`);
        }

        generateQuestion();
    </script>
</body>
</html>
