<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유리수 사칙연산 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background-color: #fdf6ff; }
        .fraction-box {
            display: inline-flex; flex-direction: column; align-items: center;
            background: white; padding: 8px 15px; border: 3px solid #8b5cf6;
            border-radius: 12px; min-width: 60px;
        }
        .num-val, .den-val { font-size: 2.2rem; color: #5b21b6; line-height: 1; }
        .den-line { width: 100%; border-top: 3px solid #8b5cf6; margin: 4px 0; }
        .integer-box { font-size: 3rem; color: #5b21b6; padding: 0 10px; }
        .op-box { font-size: 2.5rem; margin: 0 15px; color: #db2777; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 md:p-10 rounded-[40px] shadow-2xl w-full max-w-2xl border-8 border-purple-100">
        <div class="flex justify-between items-end mb-4">
            <span id="progress-text" class="text-purple-500 text-xl font-bold">문제 1 / 10</span>
            <span id="score-text" class="text-pink-500 text-xl font-bold">성공: 0</span>
        </div>
        <div class="w-full bg-gray-100 rounded-full h-4 mb-8">
            <div id="progress-bar" class="bg-purple-500 h-4 rounded-full transition-all duration-500" style="width: 10%"></div>
        </div>

        <div id="quiz-page" class="text-center">
            <div id="display-area" class="flex items-center justify-center mb-10 flex-wrap gap-y-6">
                </div>

            <div class="bg-purple-50 p-6 rounded-3xl border-4 border-purple-200">
                <p class="text-xl text-purple-700 mb-4 font-bold">정답 입력 (음수는 분자에 - 표시)</p>
                <div class="flex items-center justify-center gap-4">
                    <div class="flex flex-col gap-2">
                        <input type="number" id="user-num" placeholder="분자" class="w-28 text-center text-2xl p-3 rounded-xl border-4 border-purple-400 focus:bg-purple-100 outline-none">
                        <div class="h-1 bg-gray-300 rounded-full"></div>
                        <input type="number" id="user-den" placeholder="분모" class="w-28 text-center text-2xl p-3 rounded-xl border-4 border-purple-400 focus:bg-purple-100 outline-none">
                    </div>
                    <button id="check-btn" class="bg-purple-600 hover:bg-purple-700 text-white text-2xl px-8 py-10 rounded-3xl shadow-lg transform active:scale-90 transition-all font-bold"> 정답확인 </button>
                </div>
                <p class="text-sm text-purple-400 mt-2">* 정수는 분모에 1을 써주세요!</p>
            </div>
        </div>

        <div id="result-page" class="hidden text-center py-10">
            <h1 class="text-5xl mb-6">🏆 수고했어!</h1>
            <div class="bg-purple-50 rounded-3xl p-8 mb-8">
                <p class="text-6xl font-black text-purple-600"><span id="final-score">0</span> / 10</p>
            </div>
            <input type="text" id="user-name" placeholder="이름을 남겨주세요" class="w-full text-center text-2xl p-4 rounded-2xl border-4 border-gray-200 mb-4 outline-none focus:border-purple-400">
            <button onclick="submitResult()" class="w-full bg-purple-500 hover:bg-purple-600 text-white text-3xl py-5 rounded-2xl shadow-xl font-bold">기록 제출하기</button>
        </div>
    </div>

    <script>
        let qNum = 1; let score = 0; let currentAns = { n: 0, d: 1 };

        function getGCD(a, b) { return b === 0 ? a : getGCD(b, a % b); }

        function formatVal(n, d) {
            if (d === 1) return `<div class="integer-box">${n}</div>`;
            return `<div class="fraction-box"><div class="num-val">${n}</div><div class="den-line"></div><div class="den-val">${d}</div></div>`;
        }

        function makeQuiz() {
            const types = ['int', 'frac'];
            // 숫자 생성 (음수 포함 무작위)
            let v1n = (Math.floor(Math.random() * 19) - 9) || 1;
            let v1d = types[Math.floor(Math.random()*2)] === 'int' ? 1 : Math.floor(Math.random() * 8) + 2;
            let v2n = (Math.floor(Math.random() * 19) - 9) || 1;
            let v2d = types[Math.floor(Math.random()*2)] === 'int' ? 1 : Math.floor(Math.random() * 8) + 2;
            
            const ops = ['+', '-', '×', '÷'];
            const op = ops[Math.floor(Math.random() * 4)];

            let rn, rd;
            if(op === '+') { rn = v1n*v2d + v2n*v1d; rd = v1d*v2d; }
            else if(op === '-') { rn = v1n*v2d - v2n*v1d; rd = v1d*v2d; }
            else if(op === '×') { rn = v1n*v2n; rd = v1d*v2d; }
            else { // 나눗셈은 역수 곱셈
                rn = v1n*v2d; rd = v1d*v2n;
                if(rd === 0) { makeQuiz(); return; } // 0으로 나누기 방지
            }

            const common = getGCD(Math.abs(rn), Math.abs(rd));
            let finalN = rn / common;
            let finalD = rd / common;
            if(finalD < 0) { finalN *= -1; finalD *= -1; } // 분모 음수 방지
            currentAns = { n: finalN, d: finalD };

            document.getElementById('display-area').innerHTML = `
                ${v1n < 0 ? '<span class="text-2xl">(' : ''}${formatVal(v1n, v1d)}${v1n < 0 ? '<span class="text-2xl">)</span>' : ''}
                <div class="op-box">${op}</div>
                ${v2n < 0 ? '<span class="text-2xl">(' : ''}${formatVal(v2n, v2d)}${v2n < 0 ? '<span class="text-2xl">)</span>' : ''}
                <div class="op-box">=</div>
            `;
        }

        document.getElementById('check-btn').onclick = () => {
            const un = parseInt(document.getElementById('user-num').value);
            const ud = parseInt(document.getElementById('user-den').value);

            if(isNaN(un) || isNaN(ud)) { alert("정답을 입력해주세요!"); return; }
            if(ud === 0) { alert("분모가 0일 수 없습니다!"); return; }

            const common = getGCD(Math.abs(un), Math.abs(ud));
            let sun = un / common; let sud = ud / common;
            if(sud < 0) { sun *= -1; sud *= -1; }

            if(sun === currentAns.n && sud === currentAns.d) {
                score++; alert("정답! 대단한데? 👍");
            } else {
                alert(`오답이야.. 정답은 ${currentAns.n}/${currentAns.d} 였어!`);
            }

            if(qNum < 10) {
                qNum++;
                document.getElementById('progress-text').innerText = `문제 ${qNum} / 10`;
                document.getElementById('score-text').innerText = `성공: ${score}`;
                document.getElementById('progress-bar').style.width = (qNum * 10) + "%";
                document.getElementById('user-num').value = ""; document.getElementById('user-den').value = "";
                makeQuiz();
            } else {
                document.getElementById('quiz-page').classList.add('hidden');
                document.getElementById('result-page').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        };

        function submitResult() {
            const name = document.getElementById('user-name').value;
            if(!name) { alert("이름을 써주세요!"); return; }
            alert(name + " 학생의 기록이 저장되었습니다! 캡처해서 제출하세요!");
        }

        makeQuiz();
    </script>
</body>
</html>
