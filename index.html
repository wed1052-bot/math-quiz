<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유리수 혼합계산 챌린지</title>
    <style>
        /* 외부 라이브러리 없이 표준 CSS만 사용 */
        body { font-family: sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 10px solid #2563eb; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #475569; }
        .problem-box { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 15px; padding: 40px 20px; margin-bottom: 30px; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; flex-wrap: wrap; }
        
        /* 분수 디자인 */
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; margin: 0 5px; font-size: 0.8em; }
        .num { border-bottom: 2px solid black; padding: 0 5px; }
        .den { padding: 0 5px; }
        .op { margin: 0 10px; color: #dc2626; }
        .sup { font-size: 0.6em; vertical-align: super; color: #2563eb; }

        /* 입력창 디자인 */
        .input-group { background: #eff6ff; padding: 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .fraction-input { display: flex; flex-direction: column; align-items: center; }
        input { width: 80px; text-align: center; font-size: 1.5rem; padding: 10px; border: 2px solid #bfdbfe; border-radius: 10px; outline: none; }
        input:focus { border-color: #2563eb; }
        .line { width: 100%; height: 2px; background: #1e293b; margin: 8px 0; }
        button { background: #2563eb; color: white; border: none; padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        /* 결과 화면 */
        .hidden { display: none; }
        .result-card { background: #2563eb; color: white; padding: 40px; border-radius: 30px; margin-bottom: 20px; }
        .score-big { font-size: 8rem; margin: 20px 0; font-weight: 900; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="step-txt">문제 1 / 10</span>
                <span id="score-txt">맞은 개수: 0</span>
            </div>
            <div class="problem-box" id="problem-display">
                로딩 중...
            </div>
            <div class="input-group">
                <div class="fraction-input">
                    <input type="number" id="in-n" placeholder="분자">
                    <div class="line"></div>
                    <input type="number" id="in-d" placeholder="분모">
                </div>
                <button onclick="checkAnswer()">확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden">
            <h1>학습 완료! 🎉</h1>
            <div class="result-card">
                <div id="final-score" class="score-big">0</div>
                <input type="text" id="user-name" placeholder="이름을 입력하세요" style="width:80%; font-size:1.2rem;">
            </div>
            <button onclick="window.print()" style="background:#059669; width:100%;">리포트 저장/인쇄</button>
            <p onclick="location.reload()" style="margin-top:20px; color:#64748b; cursor:pointer; text-decoration:underline;">다시 풀기</p>
        </div>
    </div>

    <script>
        // 고난도 문제 데이터 세트 (학습지 7~10번 유형)
        const problems = [
            { h: `(-2) <span class="op">×</span> <div class="frac"><div class="num">3</div><div class="den">4</div></div> <span class="op">÷</span> <div class="frac"><div class="num">1</div><div class="den">2</div></div>`, n: -3, d: 1 },
            { h: `14 <span class="op">×</span> { <div class="frac"><div class="num">-3</div><div class="den">2</div></div> <span class="op">+</span> <div class="frac"><div class="num">2</div><div class="den">7</div></div> }`, n: -17, d: 1 },
            { h: `9 <span class="op">-</span> { 5 <span class="op">+</span> (-2)<span class="sup">3</span> } <span class="op">×</span> (-7)`, n: -12, d: 1 },
            { h: `(-2)<span class="sup">3</span> <span class="op">×</span> <div class="frac"><div class="num">5</div><div class="den">8</div></div> <span class="op">÷</span> <div class="frac"><div class="num">-5</div><div class="den">6</div></div>`, n: 6, d: 1 },
            { h: `(-3)<span class="sup">2</span> <span class="op">-</span> { 10 <span class="op">+</span> (-2) <span class="op">×</span> 3 }`, n: 5, d: 1 },
            { h: `(-1)<span class="sup">100</span> <span class="op">+</span> (-1)<span class="sup">101</span> <span class="op">×</span> 5`, n: -4, d: 1 },
            { h: `{ 1 <span class="op">-</span> <div class="frac"><div class="num">2</div><div class="den">3</div></div> } <span class="op">÷</span> <div class="frac"><div class="num">5</div><div class="den">6</div></div>`, n: 2, d: 5 },
            { h: `(-5) <span class="op">×</span> <div class="frac"><div class="num">1</div><div class="den">10</div></div> <span class="op">-</span> (-2)`, n: 3, d: 2 },
            { h: `8 <span class="op">×</span> <div class="frac"><div class="num">-3</div><div class="den">4</div></div> <span class="op">÷</span> (-6)`, n: 1, d: 1 },
            { h: `(-4) <span class="op">+</span> (+7) <span class="op">-</span> (+10)`, n: -7, d: 1 }
        ];

        let currentIdx = 1;
        let score = 0;
        let currentProb;

        function showProblem() {
            currentProb = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('problem-display').innerHTML = currentProb.h + " = ";
        }

        function checkAnswer() {
            const un = parseInt(document.getElementById('in-n').value);
            const ud = parseInt(document.getElementById('in-d').value);

            if (isNaN(un) || isNaN(ud)) {
                alert("분자와 분모를 모두 입력해 주세요!");
                return;
            }

            if (un === currentProb.n && ud === currentProb.d) {
                score++;
                alert("정답입니다! 😊");
            } else {
                alert("아쉬워요! 정답은 " + currentProb.n + (currentProb.d === 1 ? "" : "/" + currentProb.d) + " 입니다.");
            }

            if (currentIdx < 10) {
                currentIdx++;
                document.getElementById('step-txt').innerText = "문제 " + currentIdx + " / 10";
                document.getElementById('score-txt').innerText = "맞은 개수: " + score;
                document.getElementById('in-n').value = "";
                document.getElementById('in-d').value = "";
                showProblem();
            } else {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('result-ui').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }

        // 시작
        window.onload = showProblem;
    </script>
</body>
</html>
