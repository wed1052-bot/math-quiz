<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유리수 무한 계산 챌린지</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 10px solid #2563eb; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #475569; }
        .problem-box { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 15px; padding: 40px 20px; margin-bottom: 30px; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; flex-wrap: wrap; line-height: 1.5; }
        
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; align-items: center; margin: 0 5px; font-size: 0.85em; }
        .num { border-bottom: 2px solid black; padding: 0 5px; }
        .den { padding: 0 5px; }
        .op { margin: 0 8px; color: #dc2626; }
        .sup { font-size: 0.6em; vertical-align: super; color: #2563eb; }

        .input-group { background: #eff6ff; padding: 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .fraction-input { display: flex; flex-direction: column; align-items: center; }
        input { width: 80px; text-align: center; font-size: 1.5rem; padding: 10px; border: 2px solid #bfdbfe; border-radius: 10px; outline: none; }
        .line { width: 100%; height: 2px; background: #1e293b; margin: 8px 0; }
        button { background: #2563eb; color: white; border: none; padding: 18px 35px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; cursor: pointer; }
        
        .hidden { display: none; }
        .result-card { background: #2563eb; color: white; padding: 40px; border-radius: 30px; margin-bottom: 20px; }
        .score-big { font-size: 7rem; font-weight: 900; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-ui">
            <div class="header">
                <span id="step-txt">문제 1 / 10</span>
                <span id="score-txt">맞은 개수: 0</span>
            </div>
            <div class="problem-box" id="problem-display">생성 중...</div>
            <div class="input-group">
                <div class="fraction-input">
                    <input type="number" id="in-n" placeholder="분자">
                    <div class="line"></div>
                    <input type="number" id="in-d" placeholder="분모" value="1">
                </div>
                <button onclick="checkAnswer()">확인</button>
            </div>
        </div>

        <div id="result-ui" class="hidden">
            <h1>오늘의 결과 🎉</h1>
            <div class="result-card">
                <div id="final-score" class="score-big">0</div>
                <input type="text" id="user-name" placeholder="이름 입력" style="width:80%; font-size:1.2rem; padding:10px; border-radius:10px; border:none; text-align:center;">
            </div>
            <button onclick="window.print()" style="background:#059669; width:100%; color:white; border:none; padding:15px; border-radius:10px; font-size:1.2rem; cursor:pointer;">성적표 저장/인쇄</button>
            <p onclick="location.reload()" style="margin-top:20px; color:#64748b; cursor:pointer; text-decoration:underline;">새로운 문제 풀기</p>
        </div>
    </div>

    <script>
        let currentIdx = 1;
        let score = 0;
        let currentProb = { n: 0, d: 1 };

        function getRand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function makeFracHtml(n, d) {
            return `<div class="frac"><div class="num">${n}</div><div class="den">${d}</div></div>`;
        }

        function generateProblem() {
            const type = getRand(1, 4);
            let html = "";
            let n = 0, d = 1;

            if (type === 1) { // 사칙혼합: a * (b/c) / (d/e)
                let a = getRand(-5, 5); if(a===0) a=2;
                let b = getRand(1, 5), c = getRand(2, 4);
                let d_val = getRand(1, 3), e = getRand(2, 5);
                html = `(${a}) <span class="op">×</span> ${makeFracHtml(b, c)} <span class="op">÷</span> ${makeFracHtml(d_val, e)}`;
                // 계산: a * (b/c) * (e/d_val) = (a*b*e) / (c*d_val)
                n = a * b * e; d = c * d_val;
            } 
            else if (type === 2) { // 거듭제곱 포함: (-a)^2 - { b + c * d }
                let a = getRand(1, 4);
                let b = getRand(5, 15);
                let c = getRand(-3, 3); if(c===0) c=-2;
                let d_val = getRand(2, 5);
                html = `(-${a})<span class="sup">2</span> <span class="op">-</span> { ${b} <span class="op">+</span> (${c}) <span class="op">×</span> ${d_val} }`;
                n = (Math.pow(-a, 2)) - (b + (c * d_val));
                d = 1;
            }
            else if (type === 3) { // 분수 덧셈 괄호: a * { (b/c) + (d/e) }
                let c = getRand(2, 3), e = getRand(4, 5);
                let b = getRand(1, 3), d_val = getRand(1, 3);
                let commonDen = c * e;
                let a = commonDen * getRand(1, 2); // 약분되도록 설계
                html = `${a} <span class="op">×</span> { ${makeFracHtml(b, c)} + ${makeFracHtml(d_val, e)} }`;
                n = a * (b * e + d_val * c);
                d = commonDen;
            }
            else { // 단순 거듭제곱 나열: (-1)^n + (-1)^m * a
                let n_pow = getRand(100, 105);
                let m_pow = n_pow + 1;
                let a = getRand(2, 9);
                html = `(-1)<span class="sup">${n_pow}</span> <span class="op">+</span> (-1)<span class="sup">${m_pow}</span> <span class="op">×</span> ${a}`;
                let resN = Math.pow(-1, n_pow);
                let resM = Math.pow(-1, m_pow);
                n = resN + (resM * a);
                d = 1;
            }

            // 기약분수 만들기
            const getGCD = (a, b) => b === 0 ? a : getGCD(b, a % b);
            let common = Math.abs(getGCD(n, d));
            currentProb.n = n / common;
            currentProb.d = d / common;
            if(currentProb.d < 0) { currentProb.n *= -1; currentProb.d *= -1; }

            document.getElementById('problem-display').innerHTML = html + " = ";
        }

        function checkAnswer() {
            const un = parseInt(document.getElementById('in-n').value);
            const ud = parseInt(document.getElementById('in-d').value);

            if (isNaN(un) || isNaN(ud)) return alert("정답을 입력하세요!");

            if (un === currentProb.n && ud === currentProb.d) {
                score++; alert("정답! 대단해요. ✨");
            } else {
                let ansStr = currentProb.d === 1 ? currentProb.n : currentProb.n + "/" + currentProb.d;
                alert("오답입니다. 정답은 " + ansStr + " 입니다.");
            }

            if (currentIdx < 10) {
                currentIdx++;
                document.getElementById('step-txt').innerText = "문제 " + currentIdx + " / 10";
                document.getElementById('score-txt').innerText = "맞은 개수: " + score;
                document.getElementById('in-n').value = ""; document.getElementById('in-d').value = "1";
                generateProblem();
            } else {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('result-ui').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = generateProblem;
    </script>
</body>
</html>
